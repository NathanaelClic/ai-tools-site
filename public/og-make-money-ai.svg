<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="glow1" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#05050a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="70%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#05050a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="coinGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c4b5fd"/>
      <stop offset="50%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="barGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="35"/>
    </filter>
    <filter id="coinBlur">
      <feGaussianBlur stdDeviation="15"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#05050a"/>

  <!-- Grid -->
  <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
    <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(124,58,237,0.04)" stroke-width="1"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Glows -->
  <rect width="1200" height="630" fill="url(#glow1)" filter="url(#blur)"/>
  <rect width="1200" height="630" fill="url(#glow2)" filter="url(#blur)"/>

  <!-- Rising bar chart (left side) -->
  <g opacity="0.9">
    <!-- Bar 1 -->
    <rect x="160" y="400" width="40" height="80" rx="4" fill="rgba(124,58,237,0.2)" stroke="rgba(124,58,237,0.4)" stroke-width="1"/>
    <!-- Bar 2 -->
    <rect x="220" y="350" width="40" height="130" rx="4" fill="rgba(124,58,237,0.3)" stroke="rgba(124,58,237,0.5)" stroke-width="1"/>
    <!-- Bar 3 -->
    <rect x="280" y="290" width="40" height="190" rx="4" fill="rgba(124,58,237,0.4)" stroke="rgba(124,58,237,0.6)" stroke-width="1"/>
    <!-- Bar 4 -->
    <rect x="340" y="220" width="40" height="260" rx="4" fill="rgba(124,58,237,0.55)" stroke="#7c3aed" stroke-width="1"/>
    <!-- Bar 5 (tallest) -->
    <rect x="400" y="160" width="40" height="320" rx="4" fill="rgba(124,58,237,0.7)" stroke="#7c3aed" stroke-width="1.5"/>

    <!-- Trend line -->
    <polyline points="180,390 240,340 300,280 360,210 420,150" fill="none" stroke="#10b981" stroke-width="2" stroke-dasharray="6,3" opacity="0.7"/>

    <!-- Arrow up -->
    <path d="M 420 130 L 430 155 L 410 155 Z" fill="#10b981" opacity="0.9"/>

    <!-- Growth label -->
    <rect x="390" y="108" width="60" height="20" rx="10" fill="rgba(16,185,129,0.15)" stroke="rgba(16,185,129,0.4)" stroke-width="1"/>
    <text x="420" y="122" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="700" fill="#10b981">+340%</text>
  </g>

  <!-- Central coin stack visual -->
  <g>
    <!-- Coin glow -->
    <circle cx="700" cy="290" r="100" fill="url(#coinGlow)" filter="url(#coinBlur)"/>

    <!-- Coin stack (bottom to top) -->
    <ellipse cx="700" cy="370" rx="70" ry="18" fill="rgba(180,120,0,0.3)" stroke="#f59e0b" stroke-width="1" stroke-opacity="0.5"/>
    <ellipse cx="700" cy="355" rx="70" ry="18" fill="rgba(180,120,0,0.4)" stroke="#f59e0b" stroke-width="1" stroke-opacity="0.6"/>
    <ellipse cx="700" cy="340" rx="70" ry="18" fill="rgba(200,140,0,0.5)" stroke="#f59e0b" stroke-width="1.5" stroke-opacity="0.7"/>

    <!-- Top coin (bright) -->
    <ellipse cx="700" cy="315" rx="70" ry="18" fill="rgba(245,158,11,0.25)" stroke="#f59e0b" stroke-width="2" stroke-opacity="0.9"/>
    <text x="700" y="321" text-anchor="middle" font-family="Arial,sans-serif" font-size="18" font-weight="900" fill="#f59e0b" opacity="0.8">$</text>

    <!-- Floating dollar signs -->
    <text x="780" y="240" font-family="Arial,sans-serif" font-size="22" fill="#10b981" opacity="0.6">$</text>
    <text x="630" y="210" font-family="Arial,sans-serif" font-size="16" fill="#10b981" opacity="0.4">$</text>
    <text x="755" y="290" font-family="Arial,sans-serif" font-size="14" fill="#f59e0b" opacity="0.5">$</text>
  </g>

  <!-- Right side: income cards -->
  <g>
    <!-- Card 1 -->
    <rect x="870" y="160" width="240" height="60" rx="10" fill="rgba(17,24,39,0.8)" stroke="rgba(124,58,237,0.25)" stroke-width="1"/>
    <text x="890" y="183" font-family="Arial,sans-serif" font-size="11" fill="#94a3b8">Affiliate Income</text>
    <text x="890" y="204" font-family="Arial,sans-serif" font-size="19" font-weight="700" fill="#10b981">$2,340/mo</text>

    <!-- Card 2 -->
    <rect x="870" y="240" width="240" height="60" rx="10" fill="rgba(17,24,39,0.8)" stroke="rgba(124,58,237,0.25)" stroke-width="1"/>
    <text x="890" y="263" font-family="Arial,sans-serif" font-size="11" fill="#94a3b8">Freelance AI Work</text>
    <text x="890" y="284" font-family="Arial,sans-serif" font-size="19" font-weight="700" fill="#a78bfa">$4,100/mo</text>

    <!-- Card 3 -->
    <rect x="870" y="320" width="240" height="60" rx="10" fill="rgba(17,24,39,0.8)" stroke="rgba(124,58,237,0.25)" stroke-width="1"/>
    <text x="890" y="343" font-family="Arial,sans-serif" font-size="11" fill="#94a3b8">Digital Products</text>
    <text x="890" y="364" font-family="Arial,sans-serif" font-size="19" font-weight="700" fill="#f59e0b">$1,820/mo</text>

    <!-- Total badge -->
    <rect x="870" y="405" width="240" height="50" rx="10" fill="rgba(124,58,237,0.15)" stroke="rgba(124,58,237,0.5)" stroke-width="1.5"/>
    <text x="890" y="425" font-family="Arial,sans-serif" font-size="11" fill="#a78bfa" letter-spacing="1">TOTAL MONTHLY</text>
    <text x="890" y="446" font-family="Arial,sans-serif" font-size="22" font-weight="900" fill="white">$8,260</text>
  </g>

  <!-- Top label -->
  <rect x="460" y="52" width="280" height="28" rx="14" fill="rgba(124,58,237,0.12)" stroke="rgba(124,58,237,0.3)" stroke-width="1"/>
  <circle cx="480" cy="66" r="4" fill="#10b981"/>
  <text x="600" y="71" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="600" fill="#a78bfa" letter-spacing="2">7 PROVEN WAYS · 2025</text>

  <!-- Main title -->
  <text x="600" y="530" text-anchor="middle" font-family="Arial,sans-serif" font-size="42" font-weight="900" fill="white">How to Make Money</text>
  <text x="600" y="580" text-anchor="middle" font-family="Arial,sans-serif" font-size="42" font-weight="900" fill="url(#textGrad)">with AI Tools</text>

  <!-- Bottom brand -->
  <text x="600" y="615" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" fill="rgba(255,255,255,0.25)" letter-spacing="3">AI TOOLS WEEKLY</text>
</svg>
