<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="glow1" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#05050a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="80%" cy="30%" r="40%">
      <stop offset="0%" stop-color="#4f46e5" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#05050a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="node1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="node2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ea580c" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#ea580c" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="node3" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0d9488" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#0d9488" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="node4" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="node5" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2563eb" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#2563eb" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c4b5fd"/>
      <stop offset="50%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="30"/>
    </filter>
    <filter id="nodeblur">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#05050a"/>

  <!-- Grid pattern -->
  <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
    <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(124,58,237,0.04)" stroke-width="1"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Glows -->
  <rect width="1200" height="630" fill="url(#glow1)" filter="url(#blur)"/>
  <rect width="1200" height="630" fill="url(#glow2)" filter="url(#blur)"/>

  <!-- Connecting lines between nodes -->
  <g opacity="0.3" stroke-width="1">
    <line x1="600" y1="315" x2="820" y2="200" stroke="#7c3aed"/>
    <line x1="600" y1="315" x2="820" y2="430" stroke="#ea580c"/>
    <line x1="600" y1="315" x2="380" y2="200" stroke="#0d9488"/>
    <line x1="600" y1="315" x2="380" y2="430" stroke="#f59e0b"/>
    <line x1="600" y1="315" x2="600" y2="150" stroke="#2563eb"/>
    <line x1="820" y1="200" x2="820" y2="430" stroke="rgba(255,255,255,0.1)"/>
    <line x1="380" y1="200" x2="380" y2="430" stroke="rgba(255,255,255,0.1)"/>
  </g>

  <!-- Node glows (blurred background) -->
  <circle cx="600" cy="315" r="50" fill="url(#node1)" filter="url(#nodeblur)" opacity="0.6"/>
  <circle cx="820" cy="200" r="35" fill="url(#node2)" filter="url(#nodeblur)" opacity="0.5"/>
  <circle cx="820" cy="430" r="35" fill="url(#node3)" filter="url(#nodeblur)" opacity="0.5"/>
  <circle cx="380" cy="200" r="35" fill="url(#node4)" filter="url(#nodeblur)" opacity="0.5"/>
  <circle cx="380" cy="430" r="35" fill="url(#node5)" filter="url(#nodeblur)" opacity="0.5"/>
  <circle cx="600" cy="150" r="28" fill="url(#node2)" filter="url(#nodeblur)" opacity="0.4"/>

  <!-- Center node (main) -->
  <circle cx="600" cy="315" r="32" fill="rgba(124,58,237,0.15)" stroke="#7c3aed" stroke-width="1.5" stroke-opacity="0.8"/>
  <circle cx="600" cy="315" r="20" fill="rgba(124,58,237,0.3)"/>
  <text x="600" y="321" text-anchor="middle" font-family="Arial,sans-serif" font-size="18" fill="white">★</text>

  <!-- Satellite nodes -->
  <circle cx="820" cy="200" r="22" fill="rgba(234,88,12,0.12)" stroke="#ea580c" stroke-width="1" stroke-opacity="0.7"/>
  <text x="820" y="206" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" fill="#ea580c">✍</text>

  <circle cx="820" cy="430" r="22" fill="rgba(13,148,136,0.12)" stroke="#0d9488" stroke-width="1" stroke-opacity="0.7"/>
  <text x="820" y="436" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" fill="#0d9488">🏄</text>

  <circle cx="380" cy="200" r="22" fill="rgba(245,158,11,0.12)" stroke="#f59e0b" stroke-width="1" stroke-opacity="0.7"/>
  <text x="380" y="206" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" fill="#f59e0b">📝</text>

  <circle cx="380" cy="430" r="22" fill="rgba(37,99,235,0.12)" stroke="#2563eb" stroke-width="1" stroke-opacity="0.7"/>
  <text x="380" y="436" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" fill="#2563eb">📊</text>

  <circle cx="600" cy="150" r="16" fill="rgba(124,58,237,0.1)" stroke="#7c3aed" stroke-width="1" stroke-opacity="0.5"/>

  <!-- Ranking badges -->
  <rect x="840" y="184" width="28" height="18" rx="9" fill="#ea580c" opacity="0.9"/>
  <text x="854" y="197" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="700" fill="white">#1</text>

  <rect x="840" y="414" width="28" height="18" rx="9" fill="#0d9488" opacity="0.9"/>
  <text x="854" y="427" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="700" fill="white">#2</text>

  <rect x="332" y="184" width="28" height="18" rx="9" fill="#f59e0b" opacity="0.9"/>
  <text x="346" y="197" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="700" fill="white">#3</text>

  <!-- Top label -->
  <rect x="480" y="52" width="240" height="28" rx="14" fill="rgba(124,58,237,0.12)" stroke="rgba(124,58,237,0.3)" stroke-width="1"/>
  <circle cx="498" cy="66" r="4" fill="#10b981"/>
  <text x="600" y="71" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="600" fill="#a78bfa" letter-spacing="2">TESTED &amp; RANKED · 2025</text>

  <!-- Main title -->
  <text x="600" y="530" text-anchor="middle" font-family="Arial,sans-serif" font-size="44" font-weight="900" fill="white">Best AI Writing Tools</text>
  <text x="600" y="580" text-anchor="middle" font-family="Arial,sans-serif" font-size="44" font-weight="900" fill="url(#textGrad)">in 2025</text>

  <!-- Bottom brand -->
  <text x="600" y="615" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" fill="rgba(255,255,255,0.25)" letter-spacing="3">AI TOOLS WEEKLY</text>
</svg>
